/* ─────────────────────────────────────────────
   COLOR TOKENS — Indigo Leather
   Vintage glove-tanned palette in the spirit of
   1980s–90s Coach Leatherware catalogs: aged ivory
   catalog stock, rich full-grain leather tones, oxblood
   and British tan, antique brass. Warm, deep, editorial.
   ───────────────────────────────────────────── */

:root {
  /* ── Backgrounds — aged catalog stock ──── */
  --bg:        #F4EBD9;   /* ivory catalog paper — default page */
  --bg-warm:   #E7D9BF;   /* warm tan stock — alternating section */
  --bg-cream:  #FAF4E7;   /* near-white inset card / panel */
  --bg-dark:   #1A130B;   /* espresso black — hero / footer */

  /* ── Glove-tanned leather palette ──────────
     The 1984 Coach color card: full-grain hides. */
  --british-tan: #B26B36;   /* PRIMARY ACCENT — iconic Coach tan */
  --tan:         #B26B36;   /* alias of british-tan (legacy refs) */
  --saddle:      #9A6230;   /* mid saddle brown */
  --tabac:       #99662F;   /* tobacco */
  --camel:       #C28E51;   /* light camel */
  --putty:       #C3B190;   /* tan-grey */
  --mocha:       #4A3526;   /* dark milk-coffee brown */
  --chocolate:   #3A2413;   /* deep brown */
  --mahogany:    #5A2A22;   /* oxblood-brown (Prairie Bag) */
  --oxblood:     #4C1D1E;   /* deepest burgundy */
  --burgundy:    #5E2122;   /* burgundy */
  --coach-red:   #8C2C24;   /* brick red */
  --sage:        #5C5C44;   /* muted olive */
  --navy:        #21304B;   /* deep navy */
  --brass:       #9C7A38;   /* antique brass hardware */
  --brass-lt:    #C2A24E;   /* lit brass highlight */

  /* ── Brand accents ────────────────────────
     Oxblood + sage echo the vintage color card. */
  --indigo:    #283B5A;   /* philosophy / quote sections (navy-indigo) */
  --hunter:    #3A4A30;   /* Ready-to-Ship / availability (sage-hunter) */

  /* ── Ink scale (text) ─────────────────────
     Warm browns, never pure grey. */
  --ink:       #1F160C;   /* primary text */
  --ink-warm:  #3A2718;   /* warm heading */
  --ink-mid:   #5F4630;   /* secondary text */
  --ink-muted: #927C68;   /* tertiary / meta */
  --ink-light: #BCA686;   /* placeholder / disabled */
  --ink-inv:   #F4EBD9;   /* text on dark */

  /* ── Rules / dividers — keyline ink ──────── */
  --rule:      #B9A079;   /* standard hairline */
  --rule-lt:   #D8C7A6;   /* light hairline */
  --rule-dk:   #7E5E3E;   /* dark hairline (on warm bg) */
  --keyline:   #2A1D10;   /* near-black editorial keyline border */

  /* ── Product leather colorways ────────────
     The 1984 Coach Glove-Tanned color card. */
  --leather-british-tan: #B26B36;
  --leather-saddle:      #9A6230;
  --leather-tabac:       #99662F;
  --leather-mahogany:    #5A2A22;
  --leather-burgundy:    #5E2122;
  --leather-mocha:       #4A3526;
  --leather-sage:        #5C5C44;
  --leather-navy:        #21304B;
  --leather-putty:       #C3B190;
  --leather-black:       #1A130B;

  /* ── Semantic aliases ─────────────────────
     Prefer these in product code. */
  --surface-page:    var(--bg);
  --surface-alt:     var(--bg-warm);
  --surface-card:    var(--bg-cream);
  --surface-dark:    var(--bg-dark);

  --text-primary:    var(--ink);
  --text-heading:    var(--ink-warm);
  --text-secondary:  var(--ink-mid);
  --text-muted:      var(--ink-muted);
  --text-disabled:   var(--ink-light);
  --text-inverse:    var(--ink-inv);

  --accent:          var(--british-tan); /* primary brand accent */
  --accent-deep:     var(--oxblood);
  --border:          var(--rule);
  --border-light:    var(--rule-lt);

  --status-rts:      var(--hunter);    /* Ready to Ship */
  --status-cto:      var(--ink);       /* Crafted to Order */
}

/* ─────────────────────────────────────────────
   TYPOGRAPHY TOKENS — Indigo Leather
   Four-font system:
   • alga             → DISPLAY + HEADINGS (Typekit serif)
   • Playfair Display → BODY / prose (serif)
   • Barlow Condensed → labels, nav, UI (condensed)
   • Courier Prime    → stamp / receipt accents (mono)
   Editorial, magazine-luxury. Italic is a signature.

   alga ships only THREE weights — 200 / 300 / 400 — which is
   the whole point: thin, high-end serif headings. Per-role
   weight assignments live in the WEIGHTS block below.
   ───────────────────────────────────────────── */

:root {
  /* ── Families ─────────────────────────────── */
  --f-display: 'alga', 'Playfair Display', Georgia, serif;          /* @kind font */
  --f-body:    'Playfair Display', Georgia, 'Times New Roman', serif; /* @kind font */
  --f-label:   'Barlow Condensed', 'Arial Narrow', sans-serif; /* @kind font */
  --f-stamp:   'Courier Prime', 'Courier New', monospace; /* @kind font */

  /* Semantic aliases */
  --font-serif-display: var(--f-display); /* @kind font */
  --font-serif-body:    var(--f-body); /* @kind font */
  --font-ui-label:      var(--f-label); /* @kind font */
  --font-mono-stamp:    var(--f-stamp); /* @kind font */

  /* ── Weights ──────────────────────────────────
     alga: 200 / 300 / 400 only.
     Playfair (body): 400..900.
     Barlow: 300 / 400 / 500 / 600. */
  --fw-light:   300; /* @kind font */
  --fw-regular: 400; /* @kind font */
  --fw-medium:  500;   /* @kind font */
  --fw-semibold:600; /* @kind font */

  /* alga (display) per-role weights */
  --fw-display-xl: 200;   /* @kind font */
  --fw-display:    300;   /* @kind font */
  --fw-heading:    400;   /* @kind font */

  /* ── Type scale (fluid, clamp) ────────────── */
  --t-display-xl: clamp(2.8rem, 6vw, 5.5rem);   /* @kind font */
  --t-display-l:  clamp(2.2rem, 4vw, 3.6rem);   /* @kind font */
  --t-heading:    clamp(1.6rem, 3vw, 2.6rem);   /* @kind font */
  --t-subhead:    clamp(1.2rem, 2vw, 1.5rem);   /* @kind font */
  --t-stat:       clamp(3rem, 7vw, 6.5rem);     /* @kind font */
  --t-body-lg:    1.125rem; /* @kind font */
  --t-body:       1rem; /* @kind font */
  --t-body-sm:    0.9rem; /* @kind font */
  --t-label:      0.75rem;   /* @kind font */
  --t-label-sm:   0.625rem;  /* @kind font */
  --t-stamp:      0.6875rem;  /* @kind font */

  /* ── Line heights ─────────────────────────── */
  --lh-tight:   1.02;   /* @kind font */
  --lh-snug:    1.15;   /* @kind font */
  --lh-heading: 1.2; /* @kind font */
  --lh-body:    1.6; /* @kind font */
  --lh-prose:   1.8;    /* @kind font */

  /* ── Letter-spacing ───────────────────────── */
  --ls-display:  0.02em; /* @kind font */
  --ls-tight:    0; /* @kind font */
  --ls-label:    0.16em;   /* @kind font */
  --ls-wide:     0.22em;   /* @kind font */
  --ls-wider:    0.28em;   /* @kind font */
  --ls-widest:   0.32em;   /* @kind font */
  --ls-stamp:    0.2em;    /* @kind font */

  /* ── Semantic text styles (reference values) ─
     primary display, body, label, stamp.
     Apply family + size + weight together. */
  --text-display:  var(--fw-display) var(--t-display-xl)/var(--lh-tight) var(--f-display); /* @kind font */
  --text-heading-style: var(--fw-heading) var(--t-heading)/var(--lh-heading) var(--f-display); /* @kind font */
  --text-body-style:    var(--fw-medium) var(--t-body)/var(--lh-prose) var(--f-body); /* @kind font */
}

/* ─────────────────────────────────────────────
   SPACING, LAYOUT, RADIUS, SHADOW — Indigo Leather
   Sharp, editorial geometry. Zero radius throughout.
   "Seam" grids use a 2px gap so cards read like
   stitched leather panels.
   ───────────────────────────────────────────── */

:root {
  /* ── Spacing scale (4px base) ─────────────── */
  --space-0:   0;
  --space-1:   4px;
  --space-2:   8px;
  --space-3:   12px;
  --space-4:   16px;
  --space-5:   20px;
  --space-6:   24px;
  --space-8:   32px;
  --space-10:  40px;
  --space-12:  48px;
  --space-16:  64px;
  --space-18:  72px;
  --space-20:  80px;
  --space-30:  120px;

  /* ── The "seam" gap ───────────────────────── */
  --seam:      2px;   /* signature inter-card gutter */

  /* ── Layout ───────────────────────────────── */
  --container:     1440px;   /* max content width */
  --container-doc: 1200px;   /* prose / docs width */
  --gutter:        48px;     /* side padding (desktop) */
  --gutter-sm:     24px;     /* side padding (mobile) */
  --section-y:     72px;     /* vertical section rhythm */

  /* ── Radius ───────────────────────────────────
     ONE radius: zero. Sharp corners everywhere. */
  --radius:    0px;
  --radius-sm: 0px;
  --radius-pill: 0px;

  /* ── Borders ──────────────────────────────── */
  --border-w:    1px;
  --border-hair: 1px;

  /* ── Shadows ──────────────────────────────────
     Restrained. Leather-warm, low-spread, never blue.
     Used sparingly — flat-with-hairline is the default. */
  --shadow-none: none;
  --shadow-sm:   0 1px 2px rgba(30, 18, 8, 0.06);
  --shadow-card: 0 8px 24px rgba(30, 18, 8, 0.08);
  --shadow-lift: 0 16px 48px rgba(30, 18, 8, 0.14);

  /* ── Z-index ──────────────────────────────── */
  --z-header:  100; /* @kind other */
  --z-overlay: 500; /* @kind other */
  --z-modal:   600; /* @kind other */
  --z-toast:   700; /* @kind other */
}

/* ─────────────────────────────────────────────
   MOTION TOKENS — Indigo Leather
   Restrained animation. Opacity + transform only.
   Nothing bounces. Everything decelerates into rest.
   ───────────────────────────────────────────── */

:root {
  /* ── Easing ───────────────────────────────── */
  --ease-out:     cubic-bezier(0, 0, 0.2, 1);              /* @kind other */
  --ease-leather: cubic-bezier(0.25, 0.46, 0.45, 0.94);   /* @kind other */
  --ease-in-out:  cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */

  /* ── Duration ─────────────────────────────── */
  --dur-fast:   0.22s;   /* @kind other */
  --dur-mid:    0.45s;   /* @kind other */
  --dur-reveal: 0.7s;    /* @kind other */

  /* ── Reveal delays (stagger) ──────────────── */
  --delay-1: 0.1s; /* @kind other */
  --delay-2: 0.2s; /* @kind other */
  --delay-3: 0.3s; /* @kind other */

  /* ── Composite transitions ────────────────── */
  --transition-base:  all var(--dur-fast) var(--ease-out); /* @kind other */
  --transition-organic: all var(--dur-mid) var(--ease-leather); /* @kind other */

  /* ── Press / active ───────────────────────── */
  --press-scale: 0.97; /* @kind other */
}

</style>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; }
  button { font: inherit; }
</style>

  <script src="b94e7765-430a-4e2e-88be-a49321b806a9" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="ce0428fa-cf6f-4b7a-ab2c-255f8096e004" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="a220267f-acda-416f-a7e1-6b061228ab0f"></script>
  <script type="text/babel" src="bcfce6db-3c05-4137-9420-cf0d42d89810"></script>
  <script type="text/babel" src="58e35bb9-6a40-4c87-90cb-e92fb4ee8b74"></script>
  <script type="text/babel" src="ca1e857a-3756-4a97-916e-d9902458d3cd"></script>
  <script type="text/babel" src="52d2a7ee-5667-4630-820a-1e3e77809407"></script>

  <script type="text/babel">
    function App() {
      const [route, setRoute] = React.useState({ name: 'home' });
      const [cart, setCart] = React.useState([]);

      const navigate = (name, extra = {}) => { setRoute({ name, ...extra }); window.scrollTo(0, 0); };
      const openProduct = (productId) => navigate('product', { productId });
      const addToCart = (item) => setCart((c) => [...c, item]);
      const removeFromCart = (i) => setCart((c) => c.filter((_, idx) => idx !== i));

      let screen;
      switch (route.name) {
        case 'collection': screen = <window.ILCollection key={route.filter || 'all'} filter={route.filter} onOpenProduct={openProduct} />; break;
        case 'product':    screen = <window.ILProductDetail productId={route.productId} onAddToCart={addToCart} onNavigate={navigate} />; break;
        case 'cart':       screen = <window.ILCart items={cart} onNavigate={navigate} onRemove={removeFromCart} />; break;
        case 'about':      screen = <window.ILAbout onNavigate={navigate} />; break;
        case 'events':     screen = <window.ILEvents />; break;
        default:           screen = <window.ILHome onNavigate={navigate} onOpenProduct={openProduct} />;
      }

      return (
        <div>
          <window.ILHeader route={route} onNavigate={navigate} cartCount={cart.length} />
          {screen}
          <window.ILFooter onNavigate={navigate} />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>


</body></html>
